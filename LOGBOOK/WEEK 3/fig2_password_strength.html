<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fig 2: Password Strength Checker</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 450px; margin: 40px auto; padding: 0 20px; }
        h2 { color: #333; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        .input-wrap { position: relative; }
        input[type="password"], input[type="text"] {
            width: 100%; padding: 8px 40px 8px 8px; margin-top: 4px;
            box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 15px;
        }
        .toggle-btn {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; font-size: 16px;
        }
        .strength-bar-wrap { margin-top: 8px; height: 8px; background: #e0e0e0; border-radius: 4px; }
        .strength-bar { height: 8px; border-radius: 4px; width: 0; transition: width 0.3s, background 0.3s; }
        .strength-label { margin-top: 6px; font-size: 14px; font-weight: bold; }
        .checklist { margin-top: 14px; list-style: none; padding: 0; font-size: 13px; }
        .checklist li { margin: 4px 0; }
        .checklist li.pass { color: green; }
        .checklist li.fail { color: #aaa; }
        .checklist li::before { margin-right: 6px; }
        .checklist li.pass::before { content: '✔'; }
        .checklist li.fail::before { content: '✘'; }
    </style>
</head>
<body>
    <h2>Fig 2: Password Strength Checker</h2>

    <label for="password">Enter Password</label>
    <div class="input-wrap">
        <input type="password" id="password" placeholder="Type a password...">
        <button class="toggle-btn" id="toggleBtn" type="button">&#128065;</button>
    </div>

    <div class="strength-bar-wrap">
        <div class="strength-bar" id="strengthBar"></div>
    </div>
    <div class="strength-label" id="strengthLabel">Enter a password</div>

    <ul class="checklist">
        <li id="chkLength" class="fail">At least 8 characters</li>
        <li id="chkUpper"  class="fail">At least one uppercase letter (A–Z)</li>
        <li id="chkLower"  class="fail">At least one lowercase letter (a–z)</li>
        <li id="chkNumber" class="fail">At least one number (0–9)</li>
        <li id="chkSpecial" class="fail">At least one special character (!@#$...)</li>
    </ul>

    <script>
        const input = document.getElementById('password');
        const bar   = document.getElementById('strengthBar');
        const label = document.getElementById('strengthLabel');
        const toggle = document.getElementById('toggleBtn');

        toggle.addEventListener('click', () => {
            input.type = input.type === 'password' ? 'text' : 'password';
        });

        input.addEventListener('input', () => {
            const val = input.value;

            const checks = {
                chkLength:  val.length >= 8,
                chkUpper:   /[A-Z]/.test(val),
                chkLower:   /[a-z]/.test(val),
                chkNumber:  /[0-9]/.test(val),
                chkSpecial: /[^A-Za-z0-9]/.test(val),
            };

            let score = Object.values(checks).filter(Boolean).length;

            Object.entries(checks).forEach(([id, passed]) => {
                const el = document.getElementById(id);
                el.className = passed ? 'pass' : 'fail';
            });

            const levels = [
                { min: 0, label: '',        color: '',        width: '0%'   },
                { min: 1, label: 'Very Weak', color: '#e53935', width: '20%' },
                { min: 2, label: 'Weak',      color: '#fb8c00', width: '40%' },
                { min: 3, label: 'Fair',      color: '#fdd835', width: '60%' },
                { min: 4, label: 'Strong',    color: '#43a047', width: '80%' },
                { min: 5, label: 'Very Strong', color: '#1b5e20', width: '100%' },
            ];

            if (val.length === 0) {
                bar.style.width = '0';
                bar.style.background = '';
                label.textContent = 'Enter a password';
                label.style.color = '#333';
            } else {
                const level = levels[score];
                bar.style.width = level.width;
                bar.style.background = level.color;
                label.textContent = 'Strength: ' + level.label;
                label.style.color = level.color;
            }
        });
    </script>
</body>
</html>
