<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fig 1: JavaScript Form Validation</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        h2 { color: #333; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        input.error { border-color: red; }
        .error-msg { color: red; font-size: 13px; margin-top: 3px; }
        button { margin-top: 16px; padding: 10px 24px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .success { color: green; font-weight: bold; margin-top: 12px; }
    </style>
</head>
<body>
    <h2>Fig 1: JavaScript Form Validation</h2>
    <form id="registrationForm" novalidate>
        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" placeholder="Enter your full name">
        <div class="error-msg" id="nameError"></div>

        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email">
        <div class="error-msg" id="emailError"></div>
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" placeholder="e.g. 0712345678">
        <div class="error-msg" id="phoneError"></div>

        <button type="submit">Submit</button>
        <div class="success" id="successMsg"></div>
    </form>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let valid = true;

            const name = document.getElementById('fullname');
            const email = document.getElementById('email');
            const phone = document.getElementById('phone');

            // Reset
            ['fullname','email','phone'].forEach(id => {
                document.getElementById(id).classList.remove('error');
            });
            ['nameError','emailError','phoneError'].forEach(id => {
                document.getElementById(id).textContent = '';
            });
            document.getElementById('successMsg').textContent = '';

            // Name validation
            if (name.value.trim() === '') {
                name.classList.add('error');
                document.getElementById('nameError').textContent = 'Full name is required.';
                valid = false;
            } else if (name.value.trim().length < 3) {
                name.classList.add('error');
                document.getElementById('nameError').textContent = 'Name must be at least 3 characters.';
                valid = false;
            }
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (email.value.trim() === '') {
                email.classList.add('error');
                document.getElementById('emailError').textContent = 'Email is required.';
                valid = false;
            } else if (!emailRegex.test(email.value.trim())) {
                email.classList.add('error');
                document.getElementById('emailError').textContent = 'Enter a valid email address.';
                valid = false;
            }

            // Phone validation (10-digit Kenyan number)
            const phoneRegex = /^0[17]\d{8}$/;
            if (phone.value.trim() === '') {
                phone.classList.add('error');
                document.getElementById('phoneError').textContent = 'Phone number is required.';
                valid = false;
            } else if (!phoneRegex.test(phone.value.trim())) {
                phone.classList.add('error');
                document.getElementById('phoneError').textContent = 'Enter a valid 10-digit phone number (e.g. 0712345678).';
                valid = false;
            }

            if (valid) {
                document.getElementById('successMsg').textContent = 'Form submitted successfully!';
                this.reset();
            }
        });
    </script>
</body>
</html>
